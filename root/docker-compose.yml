name: yundera
services:
  admin:
    image: ghcr.io/yundera/settings-center-app:1.1.38
    container_name: admin
    hostname: admin
    restart: unless-stopped
    cpu_shares: 90
    # Inject every key from the unified .env (assembled by ensure-env-vars-valid.sh
    # from .pcs.env + .pcs.secret.env + .ynd.user.env). The settings-center-app
    # reads DOMAIN, PUBLIC_IP, UID, DEFAULT_PWD, etc. via process.env to display
    # them on the System Configuration page; without this, every field renders
    # blank. No new exposure — all three source files are already bind-mounted
    # at /app/data/ below.
    env_file: .env
    environment:
      AUTHORITY_ENDPOINT: "https://8080-casaos-${DOMAIN}/v1/users"
      COMPOSE_FOLDER_PATH: "/DATA/AppData/casaos/apps/yundera/"
      # auth-registrar sidecar (defined below) hands out OIDC client_id/secret
      # pairs. Set here because the image does not ship config/core.env.json
      # (gitignored), so the dashboard would otherwise fail with
      # "OIDC_REGISTRAR_URL not configured" on every login attempt.
      OIDC_REGISTRAR_URL: "http://auth-registrar:9092/register"
    volumes:
      # The admin app SSHes back to the host as the `admin` sudoer (created by
      # ensure-admin-user.sh). Privileged work goes through `sudo -n …` on the
      # host. The container generates a fresh keypair on every start and writes
      # the pubkey here, which is admin's authorized_keys.
      - type: bind
        source: /home/admin/.ssh/
        target: /host_ssh/
      # This gives the admin app access to its own data (used to update itself)
      - type: bind
        source: /DATA/AppData/casaos/apps/yundera/
        target: /app/data
    expose:
      - "80"
    networks:
      pcs: null
    labels:
      # Standard domain with custom CA (gateway-routed)
      caddy_0: admin-${DOMAIN}
      caddy_0.import: gateway_tls
      caddy_0.reverse_proxy: "{{upstreams 80}}"
      # nip.io variant for direct access (custom CA)
      caddy_1: admin-${PUBLIC_IP_DASH}.nip.io
      caddy_1.import: gateway_tls
      caddy_1.reverse_proxy: "{{upstreams 80}}"
      # sslip.io variant for direct access (Let's Encrypt)
      caddy_2: admin-${PUBLIC_IP_DASH}.sslip.io
      caddy_2.reverse_proxy: "{{upstreams 80}}"

  
  casaos:
    image: ghcr.io/yundera/casa-img:0.4.15-42
    container_name: casaos
    hostname: casaos
    restart: unless-stopped
    cpu_shares: 90
    environment:
      PUID: 1000 # user ID used by casaos to read and write files
      PGID: 1000 # group ID used by casaos to read and write files
      USER: "${DEFAULT_USER}" # casaos default initial user (optional)
      DATA_ROOT: "/DATA" # where casaos apps data are stored

      # Environment variables used by casaos to configure reverse proxy in the app settings (not used by casaos system)
      REF_DOMAIN: "${DOMAIN}"
      REF_NET: "pcs"
      REF_PORT: "443"
      REF_SCHEME: "https"

      # (deprecated) V1 these envs are not used directly by casaos but are forwarded to the app at creation, injected in the docker compose up
      default_pwd: "${DEFAULT_PWD}"
      public_ip: "${PUBLIC_IPV4}"
      domain: "${DOMAIN}"

      # (deprecated) V2 these envs are not used directly by casaos but are forwarded to the app at creation, injected in the docker compose up
      PCS_DEFAULT_PASSWORD: "${DEFAULT_PWD}"
      PCS_DOMAIN: "${DOMAIN}" # without https://
      PCS_DATA_ROOT: "/DATA"
      PCS_PUBLIC_IP: "${PUBLIC_IPV4}"
      PCS_PUBLIC_IPV6: "${PUBLIC_IPV6}"
      PCS_EMAIL: "${EMAIL}"

      # V3 these envs are not used directly by casaos but are forwarded to the app at creation, injected in the docker compose up
      APP_DEFAULT_PASSWORD: "${DEFAULT_PWD}"
      APP_DOMAIN: "${DOMAIN}" # without https://
      APP_DATA_ROOT: "/DATA"
      APP_PUBLIC_IP: "${PUBLIC_IPV6}" #can be either v4 or v6 public ip but is regarded as the main IP
      APP_PUBLIC_IP_DASH: "${PUBLIC_IP_DASH}"
      APP_PUBLIC_IPV4: "${PUBLIC_IPV4}"
      APP_PUBLIC_IPV4_DASH: "${PUBLIC_IPV4_DASH}"
      APP_PUBLIC_IPV6: "${PUBLIC_IPV6}"
      APP_PUBLIC_IPV6_DASH: "${PUBLIC_IPV6_DASH}"
      #APP_EMAIL: "admin@${DOMAIN}"
      APP_EMAIL: "${EMAIL}"
      APP_NET: pcs

      # SMTP configuration for magic link and password reset emails
      SMTP_HOST: "smtp"
      SMTP_PORT: "587"

    networks:
      pcs: null
    labels:
      # Standard domains with custom CA (gateway-routed)
      caddy_0: 8080-casaos-${DOMAIN}, casaos-${DOMAIN}
      caddy_0.import: gateway_tls
      caddy_0.reverse_proxy: "{{upstreams 8080}}"
      # nip.io variants for direct access (custom CA)
      caddy_1: 8080-casaos-${PUBLIC_IP_DASH}.nip.io, casaos-${PUBLIC_IP_DASH}.nip.io
      caddy_1.import: gateway_tls
      caddy_1.reverse_proxy: "{{upstreams 8080}}"
      # sslip.io variants for direct access (Let's Encrypt)
      caddy_2: 8080-casaos-${PUBLIC_IP_DASH}.sslip.io, casaos-${PUBLIC_IP_DASH}.sslip.io
      caddy_2.reverse_proxy: "{{upstreams 8080}}"
      # NOTE: Root domains (${DOMAIN}, ${PUBLIC_IP_DASH}.nip.io, ${PUBLIC_IP_DASH}.sslip.io)
      # are handled in Caddyfile with configurable DEFAULT_SERVICE_HOST/PORT
    volumes:
      - type: bind
        source: /DATA
        target: /DATA
        # Add bind propagation for FUSE mounts
        bind:
          propagation: rshared
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
      - type: bind
        source: /dev
        target: /dev


  
  
  # =============================================================================
  # MESH ROUTER TUNNEL (v2)
  # Establishes WireGuard VPN tunnel to the provider for NAT traversal
  # =============================================================================
  mesh-router-tunnel:
    image: ghcr.io/yundera/mesh-router-tunnel:1.2.10
    container_name: mesh-router-tunnel
    hostname: mesh-router-tunnel
    restart: unless-stopped
    cpu_shares: 90
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      net.ipv4.ip_forward: "1"
      net.ipv4.conf.all.src_valid_mark: "1"
    environment:
      - PROVIDER=${PROVIDER_STR}
      - ROUTING_TARGET_HOST=mesh-router-caddy
      # Dual-port support for transparent HTTP/HTTPS routing
      - ROUTING_TARGET_PORT_HTTPS=443
      - ROUTING_TARGET_PORT_HTTP=80
    networks:
      pcs: null
    depends_on:
      - mesh-router-caddy

  
  # =============================================================================
  # MESH ROUTER AGENT (v2)
  # Registers public IP with backend for direct routing (bypasses VPN)
  # =============================================================================
  mesh-router-agent:
    image: ghcr.io/yundera/mesh-router-agent:1.0.10
    container_name: mesh-router-agent
    hostname: mesh-router-agent
    restart: unless-stopped
    cpu_shares: 90
    environment:
      - PROVIDER=${PROVIDER_STR}
      # Must stay in sync with Caddy's ${PUBLIC_IP_DASH}-based labels — registering
      # any other family here causes the CF Worker to rewrite Host to a hostname
      # Caddy doesn't know, and every subdomain falls into the catch-all.
      - PUBLIC_IP=${PUBLIC_IP}
      # Dual-port support for transparent HTTP/HTTPS routing
      - TARGET_PORT_HTTPS=443
      - TARGET_PORT_HTTP=80
    volumes:
      - /DATA/AppData/yundera/data/certs:/app/data
    networks:
      pcs: null

  
  # =============================================================================
  # MESH ROUTER CADDY (v2)
  # Reverse proxy with Docker container discovery via labels
  # =============================================================================
  mesh-router-caddy:
    image: ghcr.io/yundera/mesh-router-caddy:1.2.3
    container_name: mesh-router-caddy
    hostname: mesh-router-caddy
    restart: unless-stopped
    cpu_shares: 90
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /DATA/AppData/casaos/apps/yundera/Caddyfile:/etc/caddy/Caddyfile:ro
      - /DATA/AppData/yundera/data/certs:/certs:ro
      - /DATA/AppData/yundera/data/caddy/data:/data
      - /DATA/AppData/yundera/data/caddy/config:/config
    environment:
      - CADDY_DOCKER_CADDYFILE_PATH=/etc/caddy/Caddyfile
      - CADDY_INGRESS_NETWORKS=pcs
      - PCS_EMAIL=admin@${DOMAIN}
      # Root domain routing configuration
      - DOMAIN=${DOMAIN}
      - PUBLIC_IP_DASH=${PUBLIC_IP_DASH}
      - DEFAULT_SERVICE_HOST=${DEFAULT_SERVICE_HOST}
      - DEFAULT_SERVICE_PORT=${DEFAULT_SERVICE_PORT}
    networks:
      pcs: null
    depends_on:
      - mesh-router-agent

  
  # =============================================================================
  # MESH ROUTER PERF - Performance Testing Service
  # =============================================================================
  # Test endpoints:
  #   - https://perf-<domain> → Performance service (gateway-routed)
  #   - https://perf-<IP-DASH>.nip.io → Performance service (direct)
  # Endpoints: /health, /echo, /download/:size, /upload, /ws, /delay/:ms
  # =============================================================================
  mesh-router-perf:
    image: ghcr.io/yundera/mesh-router-perf:1.1.2
    container_name: mesh-router-perf
    hostname: mesh-router-perf
    restart: unless-stopped
    cpu_shares: 90
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - LOG_LEVEL=info
      - DATA_DIR=/app/data
    volumes:
      - /DATA/AppData/yundera/perf/data:/app/data
    expose:
      - "3000"
    networks:
      pcs: null
    labels:
      # Standard domain with custom CA (gateway-routed)
      caddy_0: perf-${DOMAIN}
      caddy_0.import: gateway_tls
      caddy_0.reverse_proxy: "{{upstreams 3000}}"
      # nip.io domain for direct access (custom CA)
      caddy_1: perf-${PUBLIC_IP_DASH}.nip.io
      caddy_1.import: gateway_tls
      caddy_1.reverse_proxy: "{{upstreams 3000}}"
      # sslip.io domain for direct access (Let's Encrypt)
      caddy_2: perf-${PUBLIC_IP_DASH}.sslip.io
      caddy_2.reverse_proxy: "{{upstreams 3000}}"
  
  
  smtp:
    image: ghcr.io/yundera/yundera-smtp-handler:1.0.2
    container_name: smtp
    hostname: smtp
    restart: unless-stopped
    cpu_shares: 70
    environment:
      USER_JWT: "${USER_JWT}"
      ORCHESTRATOR_URL: "${YUNDERA_USER_API}"
      SMTP_PORT: "587"
    expose:
      - "587"
    networks:
      pcs: null


  # =============================================================================
  # AUTHELIA - OIDC identity provider for PCS apps
  # Apps delegate login via OIDC authorization_code flow. Endpoints:
  #   https://auth-${DOMAIN}/.well-known/openid-configuration
  # Register new clients with scripts/tools/register-oidc-client.sh.
  # =============================================================================
  authelia:
    image: authelia/authelia:4.39
    container_name: authelia
    hostname: authelia
    restart: unless-stopped
    cpu_shares: 80
    environment:
      AUTHELIA_SESSION_SECRET_FILE: /config/secrets/session
      AUTHELIA_STORAGE_ENCRYPTION_KEY_FILE: /config/secrets/storage
      AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET_FILE: /config/secrets/reset
    volumes:
      - /DATA/AppData/yundera/auth:/config
    expose:
      - "9091"
    networks:
      pcs: null
    labels:
      # Standard domain with custom CA (gateway-routed)
      caddy_0: auth-${DOMAIN}
      caddy_0.import: gateway_tls
      caddy_0.reverse_proxy: "{{upstreams 9091}}"
      # nip.io variant for direct access (custom CA)
      caddy_1: auth-${PUBLIC_IP_DASH}.nip.io
      caddy_1.import: gateway_tls
      caddy_1.reverse_proxy: "{{upstreams 9091}}"
      # sslip.io variant for direct access (Let's Encrypt)
      caddy_2: auth-${PUBLIC_IP_DASH}.sslip.io
      caddy_2.reverse_proxy: "{{upstreams 9091}}"


  # =============================================================================
  # AUTH-REGISTRAR - OIDC client self-registration for PCS apps
  # Sidecars (e.g. nginx-hash-lock) POST their redirect URIs to
  #   http://auth-registrar:9092/register
  # on first login and get back {client_id, client_secret, issuer_url}. Caller
  # identity is derived from the source IP via PTR lookup on the pcs network —
  # client_id is never accepted as input. Intentionally NOT publicly routable.
  # See: packages/mesh-router-root/mesh-router-auth/README.md
  # =============================================================================
  auth-registrar:
    image: ghcr.io/yundera/mesh-auth:1.0.0
    container_name: auth-registrar
    hostname: auth-registrar
    restart: unless-stopped
    cpu_shares: 40
    environment:
      ISSUER_URL: https://auth-${DOMAIN}
      REGISTER_SCRIPT_PATH: /DATA/AppData/casaos/apps/yundera/scripts/tools/register-oidc-client.sh
    volumes:
      # register-oidc-client.sh + scripts/library/log.sh + ensure-auth-secrets.sh
      - /DATA/AppData/casaos/apps/yundera:/DATA/AppData/casaos/apps/yundera:ro
      # where the script writes clients.d/<id>.{yml,secret} and the rendered config
      - /DATA/AppData/yundera/auth:/DATA/AppData/yundera/auth
      # register-oidc-client.sh invokes `docker run authelia/authelia crypto hash ...`
      - /var/run/docker.sock:/var/run/docker.sock
    expose:
      - "9092"
    networks:
      pcs: null
    depends_on:
      - authelia

networks:
  pcs:
    name: pcs

x-casaos:
  main: admin
  author: Yundera Team
  category: pcs
  hostname: admin-${DOMAIN}
  icon: https://cdn.jsdelivr.net/gh/Yundera/settings-center-app@main/public/YunderaPCS-setting_iconV2.svg
  index: /
  is_uncontrolled: false
  port_map: ""
  scheme: https
  store_app_id: yundera
  title:
    custom: Settings
