name: yundera
services:
  admin:
    image: ghcr.io/yundera/settings-center-app:1.2.0
    container_name: admin
    hostname: admin
    restart: unless-stopped
    cpu_shares: 90
    # Safety net, not a tight cap. The Next.js + tsx server steady-states a few
    # hundred MB; 1G leaves room for esbuild workers and a transient spike
    # without an OOM kill, but bounds a runaway leak.
    mem_limit: 1g
    # Inject every key from the unified .env (assembled by ensure-env-vars-valid.sh
    # from .pcs.env + .pcs.secret.env + .ynd.user.env). The settings-center-app
    # reads DOMAIN, PUBLIC_IP, UID, DEFAULT_PWD, etc. via process.env to display
    # them on the System Configuration page; without this, every field renders
    # blank. No new exposure — all three source files are already bind-mounted
    # at /app/data/ below.
    env_file: .env
    environment:
      COMPOSE_FOLDER_PATH: "/DATA/AppData/casaos/apps/yundera/"
      # auth-registrar sidecar (defined below) hands out OIDC client_id/secret
      # pairs. Set here because the image does not ship config/core.env.json
      # (gitignored), so the dashboard would otherwise fail with
      # "OIDC_REGISTRAR_URL not configured" on every login attempt.
      OIDC_REGISTRAR_URL: "http://auth-registrar:9092/register"
    volumes:
      # The admin app SSHes back to the host as the `admin` sudoer (created by
      # ensure-admin-user.sh). Privileged work goes through `sudo -n …` on the
      # host. The container generates a fresh keypair on every start and writes
      # the pubkey here, which is admin's authorized_keys.
      - type: bind
        source: /home/admin/.ssh/
        target: /host_ssh/
      # This gives the admin app access to its own data (used to update itself)
      - type: bind
        source: /DATA/AppData/casaos/apps/yundera/
        target: /app/data
    expose:
      - "80"
    networks:
      pcs: null
    labels:
      # Standard domain with custom CA (gateway-routed)
      caddy_0: admin-${DOMAIN}
      caddy_0.import: gateway_tls
      caddy_0.reverse_proxy: "{{upstreams 80}}"
      # nip.io variant for direct access (custom CA)
      caddy_1: admin-${PUBLIC_IP_DASH}.nip.io
      caddy_1.import: gateway_tls
      caddy_1.reverse_proxy: "{{upstreams 80}}"
      # sslip.io variant for direct access (Let's Encrypt)
      caddy_2: admin-${PUBLIC_IP_DASH}.sslip.io
      caddy_2.reverse_proxy: "{{upstreams 80}}"


  # NOTE: `casaos` and `casaos-oidc-bridge` no longer live in this stack. They were
  # split out into their own compose project at /DATA/AppData/.casaos (deployed by
  # scripts/self-check/ensure-casaos-stack.sh) so that retiring CasaOS in favour of
  # CasaDash becomes a stack deletion rather than surgery on this file. Container
  # names are unchanged, and both stacks share the `pcs` network, so
  # DEFAULT_SERVICE_HOST=casaos and http://casaos-oidc-bridge:8090 still resolve.
  # See doc/casadash-migration.md.




  # =============================================================================
  # MESH ROUTER TUNNEL (v2)
  # Establishes WireGuard VPN tunnel to the provider for NAT traversal
  # =============================================================================
  mesh-router-tunnel:
    image: ghcr.io/yundera/mesh-router-tunnel:1.2.10
    container_name: mesh-router-tunnel
    hostname: mesh-router-tunnel
    restart: unless-stopped
    cpu_shares: 90
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      net.ipv4.ip_forward: "1"
      net.ipv4.conf.all.src_valid_mark: "1"
    environment:
      - PROVIDER=${PROVIDER_STR}
      - ROUTING_TARGET_HOST=mesh-router-caddy
      # Dual-port support for transparent HTTP/HTTPS routing
      - ROUTING_TARGET_PORT_HTTPS=443
      - ROUTING_TARGET_PORT_HTTP=80
    networks:
      pcs: null
    depends_on:
      - mesh-router-caddy

  
  # =============================================================================
  # MESH ROUTER AGENT (v2)
  # Registers public IP with backend for direct routing (bypasses VPN)
  # =============================================================================
  mesh-router-agent:
    image: ghcr.io/yundera/mesh-router-agent:1.0.10
    container_name: mesh-router-agent
    hostname: mesh-router-agent
    restart: unless-stopped
    cpu_shares: 90
    environment:
      - PROVIDER=${PROVIDER_STR}
      # Must stay in sync with Caddy's ${PUBLIC_IP_DASH}-based labels — registering
      # any other family here causes the CF Worker to rewrite Host to a hostname
      # Caddy doesn't know, and every subdomain falls into the catch-all.
      - PUBLIC_IP=${PUBLIC_IP}
      # Dual-port support for transparent HTTP/HTTPS routing
      - TARGET_PORT_HTTPS=443
      - TARGET_PORT_HTTP=80
    volumes:
      - /DATA/AppData/yundera/data/certs:/app/data
    networks:
      pcs: null

  
  # =============================================================================
  # MESH ROUTER CADDY (v2)
  # Reverse proxy with Docker container discovery via labels
  # =============================================================================
  mesh-router-caddy:
    image: ghcr.io/yundera/mesh-router-caddy:1.2.4
    container_name: mesh-router-caddy
    hostname: mesh-router-caddy
    restart: unless-stopped
    cpu_shares: 90
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /DATA/AppData/casaos/apps/yundera/Caddyfile:/etc/caddy/Caddyfile:ro
      - /DATA/AppData/yundera/data/certs:/certs:ro
      - /DATA/AppData/yundera/data/caddy/data:/data
      - /DATA/AppData/yundera/data/caddy/config:/config
    environment:
      - CADDY_DOCKER_CADDYFILE_PATH=/etc/caddy/Caddyfile
      - CADDY_INGRESS_NETWORKS=pcs
      - PCS_EMAIL=admin@${DOMAIN}
      # Root domain routing configuration
      - DOMAIN=${DOMAIN}
      - PUBLIC_IP_DASH=${PUBLIC_IP_DASH}
      - DEFAULT_SERVICE_HOST=${DEFAULT_SERVICE_HOST}
      - DEFAULT_SERVICE_PORT=${DEFAULT_SERVICE_PORT}
    networks:
      pcs: null
    depends_on:
      - mesh-router-agent

  smtp:
    image: ghcr.io/yundera/mail-gateway:1.0.4
    container_name: smtp
    hostname: smtp
    restart: unless-stopped
    cpu_shares: 70
    environment:
      # Provider mode: route mail through the mesh-router-backend that owns this PCS's domain
      # (same as the nsl path), sending from <app>.<user-domain>@<server-domain>. The gateway
      # derives the endpoint + credential from PROVIDER_STR — no orchestrator email API.
      RELAY_CREDENTIAL: "${PROVIDER_STR}"
      SMTP_PORT: "587"
    expose:
      - "587"
    networks:
      pcs: null


  # =============================================================================
  # DEX - OIDC identity broker for PCS apps (replaces Authelia)
  # Apps delegate login via OIDC authorization_code flow. Endpoints:
  #   https://auth-${DOMAIN}/.well-known/openid-configuration
  # User identity is federated to CasaOS through the casaos-oidc-bridge connector
  # (defined below). App clients are registered dynamically by auth-registrar over
  # Dex's gRPC API — no static client list. Config + sqlite + issued client
  # secrets are provisioned by scripts/self-check/ensure-dex.sh into
  # /DATA/AppData/yundera/dex/.
  # =============================================================================
  dex:
    image: ghcr.io/dexidp/dex:v2.43.1
    container_name: dex
    hostname: dex
    restart: unless-stopped
    cpu_shares: 80
    command: ["dex", "serve", "/data/config.yaml"]
    # If the bridge issuer is NOT served with a publicly-trusted cert (e.g. an
    # internal-CA-only test host), Dex's back-channel TLS to it will fail; in
    # that case add a CA bundle and:
    #   environment:
    #     SSL_CERT_FILE: /data/ca-bundle.crt
    volumes:
      # config.yaml (rendered) + dex.db (sqlite). This is CACHE, not precious
      # data — see the recovery note in scripts/self-check/ensure-dex.sh.
      - /DATA/AppData/yundera/dex:/data
    expose:
      - "5556"   # OIDC web endpoints (Caddy terminates TLS), bound on pcs
      - "5557"   # gRPC client-mgmt API — UNAUTHENTICATED, bound to dex-internal IP only
    networks:
      pcs: null
      # gRPC (5557) is bound to this static IP in config.yaml.tmpl, so it is
      # reachable ONLY by containers on dex-internal (just auth-registrar).
      dex-internal:
        ipv4_address: 172.31.7.2
    # No `depends_on: casaos-oidc-bridge` — the bridge now lives in the separate
    # `casaos` stack (/DATA/AppData/.casaos) and Compose cannot express a
    # cross-project dependency. Both containers are `restart: unless-stopped` on the
    # shared `pcs` network, and Dex retries its connector, so cold-boot ordering
    # resolves itself.
    labels:
      # Standard domain with custom CA (gateway-routed)
      caddy_0: auth-${DOMAIN}
      caddy_0.import: gateway_tls
      caddy_0.reverse_proxy: "{{upstreams 5556}}"
      # nip.io variant for direct access (custom CA)
      caddy_1: auth-${PUBLIC_IP_DASH}.nip.io
      caddy_1.import: gateway_tls
      caddy_1.reverse_proxy: "{{upstreams 5556}}"
      # sslip.io variant for direct access (Let's Encrypt)
      caddy_2: auth-${PUBLIC_IP_DASH}.sslip.io
      caddy_2.reverse_proxy: "{{upstreams 5556}}"


  # =============================================================================
  # AUTH-REGISTRAR - OIDC client self-registration for PCS apps
  # Sidecars (e.g. nginx-hash-lock) POST their redirect URIs to
  #   http://auth-registrar:9092/register
  # on first login and get back {client_id, client_secret, issuer_url}. Caller
  # identity is derived from the source IP via PTR lookup on the pcs network —
  # client_id is never accepted as input. Intentionally NOT publicly routable.
  # In Dex mode it calls Dex's gRPC CreateClient.
  #
  # STATELESS: the registrar's client-secret cache lives inside the container
  # (DEX_CLIENTS_DIR=/tmp/dex-clients) and is deliberately NOT bind-mounted to the
  # data volume — there is no per-client secret to back up. Within a container
  # lifetime the cache makes re-registration idempotent (same secret); after a
  # restart the cache is empty and the registrar transparently rotates each
  # client's secret on its next /register. Apps re-register on every login, so
  # this is invisible. See: packages/mesh-router-root/mesh-router-auth/README.md
  # =============================================================================
  auth-registrar:
    image: ghcr.io/yundera/mesh-auth:1.1.3
    container_name: auth-registrar
    hostname: auth-registrar
    restart: unless-stopped
    cpu_shares: 40
    environment:
      ISSUER_URL: https://auth-${DOMAIN}
      REGISTRAR_BACKEND: dex
      # Dex gRPC is reachable only on the isolated dex-internal net (static IP)
      DEX_GRPC_ADDR: 172.31.7.2:5557
      # ephemeral in-container cache (NOT persisted) — see note above
      DEX_CLIENTS_DIR: /tmp/dex-clients
      # Allowed redirect-URI host suffixes (comma-separated). An app's permitted
      # hosts are <app>-<suffix> for each; the registrar verifies every requested
      # callback against this exact set. Must list the SAME suffixes the apps'
      # caddy_* labels use — the user domain plus the IP-based fallbacks.
      REDIRECT_HOST_SUFFIXES: "${DOMAIN},${PUBLIC_IP_DASH}.nip.io,${PUBLIC_IP_DASH}.sslip.io"
    expose:
      - "9092"
    networks:
      pcs: null            # /register from app sidecars + PTR attestation
      dex-internal: null   # gRPC to Dex
    depends_on:
      - dex

networks:
  pcs:
    name: pcs
  # Isolated gRPC-only net for the auth-registrar <-> Dex client-management API.
  # internal: true → no egress (Dex's egress comes from the pcs network it is also
  # on). App containers live only on pcs, so they cannot reach Dex's gRPC port
  # (5557), which is bound to 172.31.7.2 on this net. The subnet is pinned so Dex
  # can bind gRPC to a known IP — keep it clear of other host docker networks.
  dex-internal:
    name: dex-internal
    internal: true
    ipam:
      config:
        - subnet: 172.31.7.0/29

x-casaos:
  main: admin
  author: Yundera Team
  category: pcs
  hostname: admin-${DOMAIN}
  icon: https://cdn.jsdelivr.net/gh/Yundera/settings-center-app@main/public/YunderaPCS-setting_iconV2.svg
  index: /
  is_uncontrolled: false
  port_map: ""
  scheme: https
  store_app_id: yundera
  title:
    custom: Settings
